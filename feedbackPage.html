<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
    *{
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
        font-weight: bold;
        color: #f0f0f0; 
    }

    body {
        background-color: #121212; 
        margin: 0;
    }

    .registration{
        background: #1e1e1e; 
        margin: 10vh 100px;
        padding: 5%;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 20px;
    }

    .registration form{
        width: 100%;
        max-width: 600px;
        background: #2d2d2d; 
        display: flex;
        flex-direction: column;
        gap: 2vh;
        padding: 5%;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .registration form:hover{
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 255, 255, 0.05); 

    }

    .card{
        padding: 5%;
        width: 100%;
        border-radius: 16px;
        background: #3d3d3d; 
        transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
    
        position: relative; 
        cursor: pointer;
    }

    .card:hover {
        background: #4a4a4a; 
        transform: translateY(-5px); 
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 255, 255, 0.05); /* Adds depth and a faint glow */
    }

    .three{
        display: flex;
        gap: 2px;
    }

    .three div{
        background: #2d2d2d; 
        padding: 1%;
        border-radius: 8px;
        border: 1px solid #444;
    }


    input[type="text"] {
        background: #1e1e1e;
        border: 1px solid #555;
        color: white;
        padding: 8px;
        border-radius: 4px;
        margin-top: 5px;
        width: 100%;
    }

    .language div{
        background: #2d2d2d; 
        padding: 5%;
        border-radius: 8px;
        border: 1px solid #444;
    }

    .last{
        display: flex;
        justify-content: center;
    }

    .button{
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        background: #3d3d3d; 
        transition: 0.3s ease;
        border-radius: 12px;
    }

    .button:hover{
        background: #555;
        transform: translateY(-5px); 
    }

    .language{
        display: flex;
        flex-direction: row;
        gap: 1rem;
    }

    textarea {
        background: #1e1e1e;
        border: 1px solid #555;
        color: white;
        padding: 8px;
        border-radius: 4px;
        margin-top: 5px;
        width: 100%;
        resize: vertical;
    }


    @media(max-width:850px){
        .registration {
            margin: 5vh 20px;
        }
        .language {
            flex-wrap: wrap;
        }
    }


    @media(max-width:450px){
        .three{
            flex-wrap: wrap;
            gap: 8px;
        }
    }
</style>
</head>
<body>
    <h1 style="text-align: center;">FeedBack</h1>
    <div class="registration">
        <form>
            <div class="card one">
                <label for="name">Enter your name: </label>
                <input type="text" name="name" id="name" placeholder="name" required>
            </div>
            <div class="card two">
                <div class="language">
                <p>Enter your favorite web component: </p>

                    <div>
                        <input type="radio" name="fav_lang" id="html" value="HTML">
                        <label for="html">HTML</label>
                    </div>

                    <div>
                        <input type="radio" name="fav_lang" id="css" value="CSS">
                        <label for="css">CSS</label>
                    </div>

                    <div>
                        <input type="radio" name="fav_lang" id="js" value="JS">
                        <label for="js">JavaScript</label>
                    </div>
                </div>
            </div>
            <div class="card three">
            
                <p>Rate Your Experience:</p>

                <div>
                    <input type="radio" name="rating" id="one" value="1">
                    <label for="one">1</label>
                </div>

                <div>
                    <input type="radio" name="rating" id="two" value="2">
                    <label for="two">2</label>
                </div>

                <div>
                    <input type="radio" name="rating" id="three" value="3">
                    <label for="three">3</label>
                </div>

                <div>
                    <input type="radio" name="rating" id="four" value="4">
                    <label for="four">4</label>
                </div>

                <div>
                    <input type="radio" name="rating" id="five" value="5">
                    <label for="five">5</label>
                </div>

            </div>

            <div class="card four">
                <label for="feedback">Additional Feedback</label>
                <textarea id="feedback" name="feedback" rows="4" placeholder="Write your feedback..."></textarea>
            </div>


            <div class="last">
                <button class="button" type="submit">submit</button>
            </div>
        </form>
    </div>

    <footer>
        <script>
        const form = document.querySelector(".registration form");

        form.addEventListener("submit", function (e) {
        e.preventDefault();

        const name = document.querySelector("#name").value;
        const choice = document.querySelector('input[name="fav_lang"]:checked')?.value;

        if (!choice) {
            alert("Please select a favorite web component");
            return;
        }

        alert(`Hello ${name}, you chose ${choice}. Thanks for your feedback.`);
        })
        </script>
    </footer>

</html>
